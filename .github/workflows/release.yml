name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version to publish or increment
        required: true
        default: current
        type: choice
        options:
          - current
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish Chrome extension
    runs-on: ubuntu-latest
    env:
      BUMP: ${{ inputs.bump }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Check out the default branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.6'

      - name: Install frozen dependencies
        run: |
          set -euo pipefail
          bun install --frozen-lockfile

      - name: Prepare the release version
        id: release
        run: |
          set -euo pipefail

          case "$BUMP" in
            current)
              if ! TRACKED_STATUS="$(git status --porcelain --untracked-files=no)"; then
                echo "Unable to inspect the tracked worktree." >&2
                exit 1
              fi
              if [[ -n "$TRACKED_STATUS" ]]; then
                echo "Publishing the current version requires a clean tracked worktree." >&2
                exit 1
              fi
              ;;
            patch|minor|major)
              (
                cd apps/extension
                bun pm version "$BUMP" --no-git-tag-version
              )
              bun install --lockfile-only
              bun install --frozen-lockfile
              ;;
            *)
              echo "Unsupported release input: $BUMP" >&2
              exit 1
              ;;
          esac

          VERSION="$(bun -e 'const pkg = await Bun.file("apps/extension/package.json").json(); console.log(pkg.version)')"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid extension version: $VERSION" >&2
            exit 1
          fi

          TAG="v$VERSION"
          set +e
          TAG_PROBE_OUTPUT="$(git ls-remote --exit-code --tags origin "refs/tags/$TAG" "refs/tags/$TAG^{}" 2>&1)"
          TAG_PROBE_STATUS=$?
          set -e
          case "$TAG_PROBE_STATUS" in
            0)
              if [[ "$BUMP" != "current" ]]; then
                echo "Tag $TAG already exists; bump releases cannot resume." >&2
                exit 1
              fi
              TAG_COMMIT="$(printf '%s\n' "$TAG_PROBE_OUTPUT" | awk -v tag_ref="refs/tags/$TAG^{}" '$2 == tag_ref { print $1 }')"
              HEAD_COMMIT="$(git rev-parse HEAD)"
              if [[ -z "$TAG_COMMIT" || "$TAG_COMMIT" != "$HEAD_COMMIT" ]]; then
                echo "Tag $TAG does not resolve to the current default-branch HEAD." >&2
                exit 1
              fi
              RESUME=true
              ;;
            2)
              RESUME=false
              ;;
            *)
              printf '%s\n' "$TAG_PROBE_OUTPUT" >&2
              echo "Unable to inspect tag $TAG on origin." >&2
              exit 1
              ;;
          esac

          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
          printf 'resume=%s\n' "$RESUME" >> "$GITHUB_OUTPUT"

      - name: Typecheck, test, and build the Chrome ZIP
        run: |
          set -euo pipefail
          bun run typecheck
          bun run test
          bun run zip

      - name: Verify and prepare release assets
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          bun run release:verify -- "$TAG" apps/extension/.output/chrome-mv3/manifest.json

          SOURCE_ZIP="apps/extension/.output/tabstow-$VERSION-chrome.zip"
          RELEASE_ZIP="apps/extension/.output/tabstow-v$VERSION-chrome.zip"
          CHECKSUMS="apps/extension/.output/SHA256SUMS"
          test -f "$SOURCE_ZIP"
          mv -- "$SOURCE_ZIP" "$RELEASE_ZIP"
          (
            cd apps/extension/.output
            sha256sum "tabstow-v$VERSION-chrome.zip" > SHA256SUMS
          )
          test -s "$CHECKSUMS"

      - name: Commit, tag, and push
        if: ${{ steps.release.outputs.resume != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ "$BUMP" == "current" ]]; then
            if ! TRACKED_STATUS="$(git status --porcelain --untracked-files=no)"; then
              echo "Unable to inspect the tracked worktree." >&2
              exit 1
            fi
            if [[ -n "$TRACKED_STATUS" ]]; then
              echo "Publishing the current version requires a clean tracked worktree." >&2
              exit 1
            fi
          else
            if ! git diff --quiet -- . ':(exclude)apps/extension/package.json' ':(exclude)bun.lock'; then
              echo "The version bump changed tracked files other than the package and lockfile." >&2
              exit 1
            fi

            git add -- apps/extension/package.json bun.lock
            if [[ "$(git diff --cached --name-only)" != $'apps/extension/package.json\nbun.lock' ]]; then
              echo "The version bump must change exactly the extension package and lockfile." >&2
              exit 1
            fi
            git commit -m "chore(release): bump version to $VERSION"
          fi

          git tag -a "$TAG" -m "Release $TAG"
          PUSH_URL="https://github.com/$GITHUB_REPOSITORY.git"
          AUTH_HEADER="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
          if [[ "$BUMP" == "current" ]]; then
            git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $AUTH_HEADER" push "$PUSH_URL" "refs/tags/$TAG"
          else
            git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $AUTH_HEADER" push --atomic "$PUSH_URL" "HEAD:refs/heads/$DEFAULT_BRANCH" "refs/tags/$TAG"
          fi

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          set +e
          RELEASE_PROBE_OUTPUT="$(gh api --include "/repos/$GITHUB_REPOSITORY/releases/tags/$TAG" 2>&1)"
          RELEASE_PROBE_STATUS=$?
          set -e
          RELEASE_HTTP_STATUS="$(printf '%s\n' "$RELEASE_PROBE_OUTPUT" | awk '
            $1 ~ /^HTTP\// && $2 ~ /^[0-9][0-9][0-9]$/ { status = $2 }
            match($0, /\(HTTP [0-9][0-9][0-9]\)/) { status = substr($0, RSTART + 6, 3) }
            END { print status }
          ')"

          case "$RELEASE_PROBE_STATUS:$RELEASE_HTTP_STATUS" in
            0:200)
              RELEASE_EXISTS=true
              ;;
            1:404)
              RELEASE_EXISTS=false
              ;;
            *)
              printf '%s\n' "$RELEASE_PROBE_OUTPUT" >&2
              echo "Unable to inspect GitHub Release $TAG." >&2
              exit 1
              ;;
          esac

          RELEASE_ZIP="apps/extension/.output/tabstow-v$VERSION-chrome.zip"
          CHECKSUMS="apps/extension/.output/SHA256SUMS"
          if [[ "$RELEASE_EXISTS" == "false" ]]; then
            gh release create "$TAG" \
              "$RELEASE_ZIP" \
              "$CHECKSUMS" \
              --verify-tag \
              --generate-notes \
              --title "$TAG"
          else
            if ! ASSET_NAMES="$(gh release view "$TAG" --json assets --jq '.assets[].name')"; then
              echo "Unable to inspect assets for GitHub Release $TAG." >&2
              exit 1
            fi

            RELEASE_ZIP_NAME="${RELEASE_ZIP##*/}"
            CHECKSUMS_NAME="${CHECKSUMS##*/}"
            MISSING_ASSETS=()
            if ! grep -Fxq "$RELEASE_ZIP_NAME" <<< "$ASSET_NAMES"; then
              MISSING_ASSETS+=("$RELEASE_ZIP")
            fi
            if ! grep -Fxq "$CHECKSUMS_NAME" <<< "$ASSET_NAMES"; then
              MISSING_ASSETS+=("$CHECKSUMS")
            fi

            if (( ${#MISSING_ASSETS[@]} > 0 )); then
              gh release upload "$TAG" "${MISSING_ASSETS[@]}"
            fi
          fi
